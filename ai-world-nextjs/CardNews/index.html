<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>카드뉴스 에디터 — M6</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Black+Han+Sans&display=swap">
<style>
@font-face {
  font-family: 'Pretendard';
  src: url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/woff2/PretendardVariable.woff2') format('woff2-variations');
  font-weight: 100 900;
}
:root{
  --bg-app:#eef1f6; --panel:#ffffff; --ink:#1a2233; --muted:#6b7684; --line:#e3e7ee;
  --accent:#2f5bff; --brandacc:#1a3fd6; --hl:#2f5bff; --glow:rgba(47,91,255,.18);
  --card-bg:#ffffff; --card-ink:#101625; --card-sub:#5b6577;
  --grad-a:#2f5bff; --grad-b:#6db3ff;
  --head-font:'Pretendard',sans-serif; --body-font:'Pretendard',sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{font-family:'Pretendard',-apple-system,'Malgun Gothic',sans-serif;background:var(--bg-app);color:var(--ink);height:100vh;overflow:hidden;}

/* ---------- 3열 레이아웃 ---------- */
.app{display:flex;height:100vh;}
.filmstrip{width:168px;flex:none;background:var(--panel);border-right:1px solid var(--line);
  display:flex;flex-direction:column;padding:14px 12px;gap:10px;overflow-y:auto;}
.stage-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  padding:28px 20px;gap:14px;overflow-y:auto;}
.field-col{width:340px;flex:none;background:var(--panel);border-left:1px solid var(--line);
  padding:20px;display:flex;flex-direction:column;gap:16px;overflow-y:auto;}

h1{font-size:15px;margin:0 0 2px;letter-spacing:-.02em;}
.tagline{font-size:11px;color:var(--muted);margin:0 0 6px;}
.hint{font-size:11px;color:var(--muted);line-height:1.5;}
.status{font-size:12px;color:var(--muted);min-height:16px;}

/* filmstrip */
.fs-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
.thumb{width:100%;aspect-ratio:1080/1350;border-radius:8px;overflow:hidden;position:relative;
  border:2px solid transparent;cursor:grab;box-shadow:0 1px 4px rgba(20,30,60,.12);background:#000;}
.thumb.active{border-color:var(--accent);}
.thumb .thumb-scaler{width:1080px;height:1350px;transform:scale(0.1111);transform-origin:top left;pointer-events:none;}
.thumb-badge{position:absolute;left:4px;top:4px;background:rgba(0,0,0,.55);color:#fff;font-size:9px;
  padding:1px 5px;border-radius:4px;font-weight:700;z-index:2;}
.thumb-del{position:absolute;right:4px;top:4px;background:rgba(220,40,50,.85);color:#fff;font-size:10px;
  width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:2;line-height:1;}
.thumb.dragover{outline:2px dashed var(--accent);outline-offset:2px;}
.add-slide{width:100%;border:1.5px dashed var(--line);border-radius:8px;padding:10px;
  background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;}
.add-slide:hover{border-color:var(--accent);color:var(--accent);}

/* stage */
.stage-frame{width:400px;height:500px;border-radius:12px;overflow:hidden;
  box-shadow:0 8px 30px rgba(20,30,60,.15);position:relative;background:#000;flex:none;}
.stage-scaler{width:1080px;height:1350px;transform:scale(0.37037);transform-origin:top left;}
.deck-actions{display:flex;gap:8px;width:400px;}

button{cursor:pointer;border:none;border-radius:8px;padding:9px 12px;font-family:inherit;font-size:12.5px;font-weight:600;}
.btn-primary{background:linear-gradient(135deg,var(--grad-a),var(--grad-b));color:#fff;}
.btn-primary:hover{filter:brightness(1.05);}
.btn-secondary{background:#f1f3f8;color:var(--ink);}
.btn-secondary:hover{background:#e6e9f2;}
.btn-danger{background:#fdeceb;color:#c22a2a;}
.btn-danger:hover{background:#fbdbd9;}

/* field panel */
.field-group{display:flex;flex-direction:column;gap:6px;}
.field-group label{font-size:12px;font-weight:600;color:var(--muted);}
.field-group textarea,.field-group input[type=text]{
  width:100%;border:1px solid var(--line);border-radius:8px;padding:8px 10px;
  font-family:inherit;font-size:13px;resize:vertical;min-height:38px;color:var(--ink);}
select{width:100%;padding:8px 10px;border-radius:8px;border:1px solid var(--line);
  font-family:inherit;font-size:13px;background:#fff;}
.accent-row{display:flex;align-items:center;gap:10px;}
.accent-row input[type=color]{width:40px;height:34px;border:1px solid var(--line);border-radius:8px;padding:2px;background:#fff;}
.divider{height:1px;background:var(--line);margin:2px 0;}
input[type=file]{font-size:11px;width:100%;}

/* palette swatches */
.swatches{display:flex;flex-wrap:wrap;gap:8px;}
.swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid #fff;
  box-shadow:0 0 0 1px var(--line);}
.swatch.selected{box-shadow:0 0 0 2px var(--ink);}

/* photo upload zone */
.photo-zone{border:1.5px dashed var(--line);border-radius:10px;padding:12px;display:flex;
  flex-direction:column;gap:8px;align-items:center;text-align:center;}
.photo-zone img{max-width:100%;border-radius:8px;max-height:120px;object-fit:cover;}
.photo-zone .zone-hint{font-size:11px;color:var(--muted);}
.style-badge{display:inline-block;font-size:10px;font-weight:700;color:#fff;background:var(--accent);
  padding:2px 8px;border-radius:999px;margin-left:6px;}

/* ---------- 카드 공통 (스타일 변수 기반) ---------- */
.card{width:1080px;height:1350px;position:relative;overflow:hidden;background:var(--card-bg);
  color:var(--card-ink);font-family:var(--body-font);display:flex;flex-direction:column;}
.card .hl{color:var(--hl);font-weight:800;} .card b{font-weight:800;}
.pad{padding:80px 76px;flex:1;display:flex;flex-direction:column;position:relative;z-index:1;}
.chip{display:inline-flex;align-items:center;gap:8px;align-self:flex-start;padding:10px 22px;border-radius:999px;
  font-size:24px;font-weight:700;background:linear-gradient(135deg,var(--grad-a),var(--grad-b));color:#fff;letter-spacing:-.01em;}
.gradbar{height:14px;width:100%;background:linear-gradient(90deg,var(--grad-a),var(--grad-b));position:relative;z-index:1;}

/* 사진 배경 + 가독성 스크림 */
.card.has-photo{background-size:cover;background-position:center;}
.card.has-photo::before{content:'';position:absolute;inset:0;z-index:0;
  background:linear-gradient(180deg, rgba(0,0,0,.30) 0%, rgba(0,0,0,.05) 28%, rgba(0,0,0,var(--scrim-a,0.85)) 100%);}
.card.has-photo .card-cover .title, .card.has-photo .title,
.card.has-photo .sub, .card.has-photo .head, .card.has-photo .desc,
.card.has-photo .tag, .card.has-photo .idx{ color:#fff; }
.card.needs-photo:not(.has-photo){display:flex;align-items:center;justify-content:center;}
.card.needs-photo:not(.has-photo) .pad{background:linear-gradient(160deg,var(--grad-a),var(--grad-b));
  align-items:center;justify-content:center;text-align:center;}
.card.needs-photo:not(.has-photo) .photo-placeholder-note{display:block;}
.photo-placeholder-note{display:none;font-size:22px;color:rgba(255,255,255,.85);font-weight:600;
  border:2px dashed rgba(255,255,255,.5);border-radius:16px;padding:24px 32px;}

/* cover */
.card-cover .pad{justify-content:center;gap:28px;}
.card-cover .title{font-family:var(--head-font);font-size:76px;font-weight:800;line-height:1.22;letter-spacing:-.03em;color:var(--card-ink);}
.card-cover .sub{font-size:32px;font-weight:500;color:var(--card-sub);line-height:1.5;}
.card-cover .corner{position:absolute;right:-60px;top:-60px;width:280px;height:280px;border-radius:50%;
  background:radial-gradient(circle at 30% 30%,var(--grad-b),var(--grad-a));opacity:.15;z-index:0;}

/* content */
.card-content .pad{justify-content:flex-start;gap:22px;}
.card-content .top-row{display:flex;align-items:center;justify-content:space-between;}
.card-content .tag{font-size:26px;font-weight:700;color:var(--accent);}
.card-content .idx{font-size:24px;font-weight:600;color:var(--card-sub);}
.card-content .num{font-size:150px;font-weight:800;line-height:1;-webkit-text-stroke:2px var(--accent);color:transparent;}
.card-content .head{font-family:var(--head-font);font-size:56px;font-weight:800;line-height:1.28;letter-spacing:-.02em;margin-top:4px;}
.card-content .desc{font-size:30px;line-height:1.6;color:var(--card-sub);margin-top:6px;}

/* quote */
.card-quote{background:linear-gradient(160deg,var(--grad-a),var(--grad-b));color:#fff;}
.card-quote .pad{justify-content:center;align-items:flex-start;gap:36px;}
.card-quote .mark{font-size:120px;font-weight:800;line-height:.6;opacity:.5;}
.card-quote .quote{font-family:var(--head-font);font-size:52px;font-weight:700;line-height:1.5;letter-spacing:-.02em;}
.card-quote .by{font-size:28px;font-weight:500;opacity:.85;}

/* table */
.card-table .pad{justify-content:flex-start;gap:30px;}
.card-table .title{font-family:var(--head-font);font-size:50px;font-weight:800;letter-spacing:-.02em;}
.card-table table{width:100%;border-collapse:collapse;font-size:26px;}
.card-table th{background:var(--accent);color:#fff;padding:18px 16px;text-align:left;font-weight:700;}
.card-table th:first-child{border-radius:12px 0 0 0;} .card-table th:last-child{border-radius:0 12px 0 0;}
.card-table td{padding:18px 16px;border-bottom:1px solid var(--line,#e3e7ee);}
.card-table tr:nth-child(even) td{background:rgba(0,0,0,.03);}

/* closing */
.card-closing{background:linear-gradient(170deg,#101625,#1a2740);color:#fff;}
.card-closing .pad{justify-content:center;align-items:center;text-align:center;gap:22px;}
.card-closing .head{font-family:var(--head-font);font-size:58px;font-weight:800;line-height:1.3;letter-spacing:-.02em;}
.card-closing .desc{font-size:28px;line-height:1.6;color:#c3cbe0;}
.card-closing .ctas{display:flex;gap:16px;margin-top:12px;}
.card-closing .cta{padding:20px 36px;border-radius:14px;font-size:28px;font-weight:700;}
.card-closing .cta.cta1{background:linear-gradient(135deg,var(--grad-a),var(--grad-b));color:#fff;}
.card-closing .cta.cta2{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.25);}
.card-closing .hint{font-size:22px;color:#8b96b3;margin-top:18px;}

/* ============ 스타일 정체성별 오버라이드 ============ */
/* mag — 매거진 형광: 깃발형 라벨 + 노랑 형광펜 강조 */
.card.style-mag .chip{ clip-path:polygon(0 0,100% 0,92% 50%,100% 100%,0 100%); border-radius:0;
  background:#ffe400; color:#111; }
.card.style-mag .hl{ background:#ffe400; color:#111; padding:0 6px; border-radius:3px; box-decoration-break:clone; -webkit-box-decoration-break:clone; }
.card.style-mag .card-content .tag{ background:#ffe400; color:#111; padding:4px 12px; border-radius:0 8px 0 8px; }

/* manga — 만화 오버레이: 세로바 라벨 + 텍스트 섀도 */
.card.style-manga .chip{ border-radius:0; border-left:10px solid #fff; background:rgba(0,0,0,.55); clip-path:none; }
.card.style-manga .title, .card.style-manga .head, .card.style-manga .quote{
  text-shadow:3px 3px 0 rgba(0,0,0,.55); }
.card.style-manga .card-content .num{ -webkit-text-stroke:2px var(--accent); }

/* pixel — 픽셀 인포: 청키 배지 + Black Han Sans 헤드라인 */
.card.style-pixel .chip{ border:4px solid var(--card-ink); border-radius:10px; box-shadow:5px 5px 0 var(--card-ink);
  background:var(--accent); }
.card.style-pixel .card-content .tag{ border:3px solid var(--accent); padding:2px 10px; border-radius:6px; }
.card.style-pixel .cta1{ border:3px solid #fff; box-shadow:4px 4px 0 rgba(255,255,255,.4); }

/* doodle — 손글씨: 비정형 라운드 + 파스텔 */
.card.style-doodle{ border-radius:48px 64px 40px 72px/64px 40px 72px 48px; }
.card.style-doodle .chip{ border-radius:40px 12px 40px 12px; border:3px solid var(--card-ink); background:transparent; color:var(--card-ink); }
.card.style-doodle .card-quote{ background:linear-gradient(160deg,var(--grad-a),var(--grad-b)); }
.card.style-doodle .cta{ border-radius:40px 12px 40px 12px; }

/* cine — 시네마틱: 미니멀 다크 (변수만으로 대부분 표현, 라벨은 얇게) */
.card.style-cine .chip{ background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.4); backdrop-filter:blur(2px); }
.card.style-cine .card-content .tag{ letter-spacing:.08em; text-transform:uppercase; font-size:22px; }

#exportStage{position:fixed;left:-4000px;top:0;width:1080px;height:1350px;}
</style>
</head>
<body>
<div class="app">
  <aside class="filmstrip" id="filmstrip">
    <div class="fs-title">슬라이드</div>
    <div id="thumbList" style="display:flex;flex-direction:column;gap:8px;"></div>
    <button class="add-slide" id="addSlideBtn">＋ 카드 추가</button>
    <div style="margin-top:auto;display:flex;flex-direction:column;gap:8px;">
      <div id="capsBadges" style="display:flex;flex-wrap:wrap;gap:4px;"></div>
      <button class="btn-secondary" id="serverSettingsBtn" style="font-size:11px;">⚙ 서버 설정</button>
      <div id="serverPanel" style="display:none;flex-direction:column;gap:8px;background:#f7f8fb;border:1px solid var(--line);border-radius:8px;padding:10px;">
        <label style="font-size:11px;font-weight:600;color:var(--muted);">서버 주소 (팀원 전용, 기본은 자동 인식)</label>
        <input type="text" id="serverAddrInput" placeholder="http://192.168.0.10:8787" style="width:100%;border:1px solid var(--line);border-radius:6px;padding:6px 8px;font-size:11px;">
        <div style="display:flex;gap:6px;">
          <button class="btn-primary" id="serverSaveBtn" style="flex:1;font-size:11px;">저장</button>
          <button class="btn-secondary" id="serverAutoBtn" style="flex:1;font-size:11px;">자동 인식</button>
        </div>
        <p class="hint" id="serverStatus" style="margin:0;"></p>
      </div>
    </div>
  </aside>

  <main class="stage-col">
    <div>
      <h1>📇 카드뉴스 에디터 — M6 <span class="style-badge" id="styleBadge"></span></h1>
      <p class="tagline">글 → AI 변환 · 6종 스타일 · localStorage 자동저장</p>
    </div>
    <button class="btn-primary" id="openConvertBtn" style="align-self:flex-start;">✨ 글로 카드 만들기</button>
    <div id="convertPanel" style="display:none;width:400px;flex-direction:column;gap:10px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px;">
      <label style="font-size:12px;font-weight:600;color:var(--muted);">글 전체 붙여넣기</label>
      <textarea id="convertText" rows="10" style="width:100%;border:1px solid var(--line);border-radius:8px;padding:8px;font-family:inherit;font-size:13px;resize:vertical;"></textarea>
      <div style="display:flex;gap:8px;">
        <button class="btn-primary" id="aiConvertBtn" style="flex:1;">✨ AI로 변환</button>
        <button class="btn-secondary" id="quickConvertBtn">빠른변환</button>
        <button class="btn-secondary" id="closeConvertBtn">닫기</button>
      </div>
      <p class="hint" id="convertStatus"></p>
    </div>
    <div class="stage-frame">
      <div class="stage-scaler"><div class="card" id="previewCard"></div></div>
    </div>
    <div class="deck-actions">
      <button class="btn-primary" id="exportZipBtn" style="flex:1;">⬇ 전체 ZIP</button>
      <button class="btn-secondary" id="exportJsonBtn">💾 JSON</button>
      <label class="btn-secondary" style="display:flex;align-items:center;justify-content:center;">📂
        <input type="file" id="importJsonInput" accept="application/json" style="display:none;">
      </label>
      <button class="btn-danger" id="resetBtn">🗑 초기화</button>
    </div>
    <p class="status" id="statusMsg"></p>
  </main>

  <aside class="field-col">
    <div class="field-group">
      <label>스타일 정체성</label>
      <select id="styleSelect"></select>
      <p class="hint" id="styleDesc"></p>
    </div>

    <div class="field-group">
      <label>포인트 색</label>
      <div class="swatches" id="swatchRow"></div>
      <div class="accent-row">
        <input type="color" id="accentPicker">
        <span class="hint" id="accentHex" style="margin:0;"></span>
      </div>
    </div>

    <div id="photoZoneHost"></div>

    <div class="divider"></div>
    <div class="field-group">
      <label>이 카드 타입</label>
      <select id="typeSelect"></select>
    </div>
    <div id="fieldsHost" style="display:flex;flex-direction:column;gap:14px;"></div>
    <div class="divider"></div>
    <p class="hint">편집 문법 — <b>Enter</b>: 줄바꿈 · <b>*단어*</b>: 포인트색 강조 · <b>**단어**</b>: 굵게</p>
  </aside>
</div>
<div id="exportStage"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
/* ============ 스타일 정체성 6종 ============ */
const STYLE_PRESETS = {
  cine:   { label:'시네마틱', desc:'다크 전면 · 블루 포인트 · 사진 배경 필수', needsPhoto:true, scrimBot:88, pool:['assets/pool/cine/1.svg','assets/pool/cine/2.svg','assets/pool/cine/3.svg','assets/pool/cine/4.svg'], headFont:"'Pretendard',sans-serif", bodyFont:"'Pretendard',sans-serif",
    vars:{ accent:'#4d8dff', cardBg:'#0c0f16', cardInk:'#f3f5fa', cardSub:'#aab4c8', gradB:'#8fc0ff' } },
  mag:    { label:'매거진 형광', desc:'깃발형 라벨 · 노랑 형광펜 강조 · 백지 본문 · 사진 배경', needsPhoto:true, scrimBot:70, pool:['assets/pool/mag/1.svg','assets/pool/mag/2.svg','assets/pool/mag/3.svg','assets/pool/mag/4.svg'], headFont:"'Pretendard',sans-serif", bodyFont:"'Pretendard',sans-serif",
    vars:{ accent:'#111111', cardBg:'#ffffff', cardInk:'#111111', cardSub:'#555555', gradB:'#fff58a' } },
  manga:  { label:'만화 오버레이', desc:'세로바 라벨 · 텍스트 섀도 · 일러스트 배경', needsPhoto:true, scrimBot:80, pool:['assets/pool/manga/1.svg','assets/pool/manga/2.svg','assets/pool/manga/3.svg','assets/pool/manga/4.svg'], headFont:"'Pretendard',sans-serif", bodyFont:"'Pretendard',sans-serif",
    vars:{ accent:'#ff3b3b', cardBg:'#111111', cardInk:'#ffffff', cardSub:'#e5e5e5', gradB:'#ff9142' } },
  pixel:  { label:'픽셀 인포', desc:'Black Han Sans 헤드라인 · 청키 배지 · 주황 포인트', needsPhoto:false, headFont:"'Black Han Sans',sans-serif", bodyFont:"'Pretendard',sans-serif",
    vars:{ accent:'#ff7a1a', cardBg:'#fff7ef', cardInk:'#231a12', cardSub:'#7a6a58', gradB:'#ffc45c' } },
  doodle: { label:'도들(손글씨)', desc:'Gaegu 폰트 전면 · 비정형 라운드 테두리 · 파스텔 핑크', needsPhoto:false, headFont:"'Gaegu',cursive", bodyFont:"'Gaegu',cursive",
    vars:{ accent:'#ff6fa5', cardBg:'#fff0f5', cardInk:'#3a2a33', cardSub:'#8a6b78', gradB:'#ffd4e5' } },
  blue:   { label:'화이트 & 블루', desc:'블루 그라데이션 · 사진 미사용', needsPhoto:false, headFont:"'Pretendard',sans-serif", bodyFont:"'Pretendard',sans-serif",
    vars:{ accent:'#2f5bff', cardBg:'#ffffff', cardInk:'#101625', cardSub:'#5b6577', gradB:'#6db3ff' } },
};
const PALETTE_11 = ['#2f5bff','#ff3b3b','#ff7a1a','#ffb703','#2ec4b6','#06a77d','#8338ec','#ff6fa5','#111111','#5b6577','#0ea5e9'];

/* ============ 카드 타입 스키마 & 샘플 ============ */
const CARD_SCHEMAS = {

const STORAGE_KEY = 'cardnews-editor-v3';

function defaultDeck(){
  return {
    handle: 'draft-' + Date.now().toString(36),
    preset: 'blue',
    accent: STYLE_PRESETS.blue.vars.accent,
    activeIdx: 0,
    slides: [
      { type:'cover',   f:{...CARD_SCHEMAS.cover.sample},   bgByStyle:{} },
      { type:'content', f:{...CARD_SCHEMAS.content.sample}, bgByStyle:{} },
      { type:'closing', f:{...CARD_SCHEMAS.closing.sample}, bgByStyle:{} },
    ]
  };
}

let state = loadState();

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return defaultDeck();
    const parsed = JSON.parse(raw);
    if(!parsed.slides || !parsed.slides.length) return defaultDeck();
    if(typeof parsed.activeIdx !== 'number') parsed.activeIdx = 0;
    if(!parsed.preset || !STYLE_PRESETS[parsed.preset]) parsed.preset = 'blue';
    parsed.slides.forEach(s => { if(!s.bgByStyle) s.bgByStyle = {}; });
    return parsed;
  }catch(e){ return defaultDeck(); }
}
function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

/* ============ 텍스트 포맷터 (XSS 안전) ============ */
function esc(s){ return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmt(raw){
  let s = esc(raw);
  s = s.replace(/\n/g,'<br>');
  s = s.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>');
  s = s.replace(/\*(.+?)\*/g,'<span class="hl">$1</span>');
  return s;
}

/* ============ 카드 렌더러 ============ */
function cardInnerHTML(type, f){
  switch(type){
    case 'cover': return `<div class="corner"></div><div class="pad">
        <span class="chip">${esc(f.badge||'')}</span>
        <div class="title">${fmt(f.title)}</div>
        <div class="sub">${fmt(f.sub)}</div>
        <div class="photo-placeholder-note">📷 배경 사진을 업로드하면 이 자리에 표시됩니다</div>
      </div>`;
    case 'content': return `<div class="gradbar"></div><div class="pad">
        <div class="top-row"><span class="tag">${esc(f.tag||'')}</span><span class="idx">${esc(f.idx||'')} / ${esc(f.total||'')}</span></div>
        <div class="num">${esc(f.num||'')}</div>
        <div class="head js-head">${fmt(f.head)}</div>
        <div class="desc js-body">${fmt(f.desc)}</div>
      </div>`;
    case 'quote': return `<div class="pad">
        <div class="mark">"</div>
        <div class="quote js-head">${fmt(f.quote)}</div>
        <div class="by">${fmt(f.by)}</div>
      </div>`;
    case 'table': {
      const lines = (f.rows||'').split('\n').map(l=>l.split('|').map(c=>c.trim())).filter(r=>r.length>1);
      const [header, ...body] = lines;
      const headHTML = header ? `<tr>${header.map(c=>`<th>${esc(c)}</th>`).join('')}</tr>` : '';
      const bodyHTML = body.map(r=>`<tr>${r.map(c=>`<td>${fmt(c)}</td>`).join('')}</tr>`).join('');
      return `<div class="pad">
          <div class="title js-head">${esc(f.title||'')}</div>
          <table>${headHTML}${bodyHTML}</table>
        </div>`;
    }
    case 'closing': return `<div class="pad">
        <div class="head js-head">${fmt(f.head)}</div>
        <div class="desc js-body">${fmt(f.desc)}</div>
        <div class="ctas"><span class="cta cta1">${esc(f.cta1||'')}</span><span class="cta cta2">${esc(f.cta2||'')}</span></div>
        <div class="hint">${esc(f.hint||'')}</div>
      </div>`;
    default: return `<div class="pad">알 수 없는 카드 타입</div>`;
  }
}

function renderCardHTML(type, f, styleKey, bgUrl, scrimVal){
  const preset = STYLE_PRESETS[styleKey] || STYLE_PRESETS.blue;
  const classes = ['card', `card-${type}`, `style-${styleKey}`];
  const styleDecls = [];
  if (preset.needsPhoto){
    classes.push('needs-photo');
    if (bgUrl){
      classes.push('has-photo');
      const scrim = (typeof scrimVal === 'number' ? scrimVal : preset.scrimBot) / 100;
      styleDecls.push(`background-image:url('${bgUrl}')`, `--scrim-a:${scrim}`);
    }
  }
  const styleAttr = styleDecls.length ? ` style="${styleDecls.join(';')}"` : '';
  return `<div class="${classes.join(' ')}"${styleAttr}>${cardInnerHTML(type, f)}</div>`;
}

/* ============ fit() — 오버플로 자동 축소 ============ */
function fitCard(cardEl){
  const headEl = cardEl.querySelector('.js-head');
  const bodyEls = cardEl.querySelectorAll('.js-body');
  let headSize = headEl ? parseFloat(getComputedStyle(headEl).fontSize) : null;
  let bodySize = bodyEls.length ? parseFloat(getComputedStyle(bodyEls[0]).fontSize) : null;
  let guard = 0;
  while (cardEl.scrollHeight > cardEl.clientHeight && guard < 60) {
    guard++;
    let shrunk = false;
    if (headSize !== null && headSize > 40){ headSize = Math.max(40, headSize-3); headEl.style.fontSize = headSize+'px'; shrunk = true; }
    if (bodySize !== null && bodySize > 23){ bodySize = Math.max(23, bodySize-2); bodyEls.forEach(b=>b.style.fontSize=bodySize+'px'); shrunk = true; }
    if (!shrunk) break;
  }
}

/* ============ 색상 유틸 ============ */
function hexToRgb(hex){ const m = hex.replace('#','').match(/.{1,2}/g).map(x=>parseInt(x,16)); return {r:m[0],g:m[1],b:m[2]}; }
function rgbToHex(r,g,b){ return '#' + [r,g,b].map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join(''); }
function shade(hex, percent){
  const {r,g,b} = hexToRgb(hex); const t = percent < 0 ? 0 : 255; const p = Math.abs(percent)/100;
  return rgbToHex(r+(t-r)*p, g+(t-g)*p, b+(t-b)*p);
}
function applyAccent(hex){
  const root = document.documentElement.style;
  const {r,g,b} = hexToRgb(hex);
  root.setProperty('--accent', hex);
  root.setProperty('--brandacc', shade(hex, -20));
  root.setProperty('--hl', hex);
  root.setProperty('--glow', `rgba(${r},${g},${b},.18)`);
  root.setProperty('--grad-a', hex);
}

/* ============ 스타일 적용 ============ */
function applyStyleVars(){
  const preset = STYLE_PRESETS[state.preset];
  const root = document.documentElement.style;
  root.setProperty('--card-bg', preset.vars.cardBg);
  root.setProperty('--card-ink', preset.vars.cardInk);
  root.setProperty('--card-sub', preset.vars.cardSub);
  root.setProperty('--grad-b', preset.vars.gradB);
  root.setProperty('--head-font', preset.headFont);
  root.setProperty('--body-font', preset.bodyFont);
  applyAccent(state.accent);
  document.getElementById('styleBadge').textContent = preset.label;
  document.getElementById('styleDesc').textContent = preset.desc;
}

/* ============ 렌더: 스테이지 ============ */
function currentBg(slide){ return slide.bgByStyle ? slide.bgByStyle[state.preset] : null; }

function renderStage(){
  const slide = state.slides[state.activeIdx];
  const host = document.getElementById('previewCard');
  const html = renderCardHTML(slide.type, slide.f, state.preset, currentBg(slide), slide.scrim).trim();
  host.outerHTML = html.replace(/^<div class="card/, '<div id="previewCard" class="card');
  const fresh = document.getElementById('previewCard');
  requestAnimationFrame(() => fitCard(fresh));
}

/* ============ 렌더: 필름스트립 ============ */
function renderFilmstrip(){
  const list = document.getElementById('thumbList');
  list.innerHTML = state.slides.map((slide, i) => `
    <div class="thumb ${i===state.activeIdx?'active':''}" draggable="true" data-idx="${i}">
      <span class="thumb-badge">${i+1}. ${CARD_SCHEMAS[slide.type]?.label || slide.type}</span>
      <span class="thumb-del" data-del="${i}" title="삭제">✕</span>
      <div class="thumb-scaler">${renderCardHTML(slide.type, slide.f, state.preset, currentBg(slide), slide.scrim)}</div>
    </div>
  `).join('');

  list.querySelectorAll('.thumb').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.closest('[data-del]')) return;
      state.activeIdx = parseInt(el.dataset.idx);
      onStateChanged({ skipFilmstrip:true });
    });
    el.addEventListener('dragstart', (e) => { e.dataTransfer.setData('text/plain', el.dataset.idx); });
    el.addEventListener('dragover', (e) => { e.preventDefault(); el.classList.add('dragover'); });
    el.addEventListener('dragleave', () => el.classList.remove('dragover'));
    el.addEventListener('drop', (e) => {
      e.preventDefault(); el.classList.remove('dragover');
      const from = parseInt(e.dataTransfer.getData('text/plain'));
      const to = parseInt(el.dataset.idx);
      if (from === to || isNaN(from)) return;
      const [moved] = state.slides.splice(from, 1);
      state.slides.splice(to, 0, moved);
      state.activeIdx = to;
      onStateChanged();
    });
  });

  list.querySelectorAll('[data-del]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      if (state.slides.length <= 1){ alert('최소 1장은 있어야 합니다.'); return; }
      const idx = parseInt(el.dataset.del);
      if (!confirm(`${idx+1}번 카드를 삭제할까요?`)) return;
      state.slides.splice(idx, 1);
      if (state.activeIdx >= state.slides.length) state.activeIdx = state.slides.length - 1;
      onStateChanged();
    });
  });
}

function renderPhotoZone(){

  host.innerHTML = `
    <div class="field-group">
      <label>이 카드의 배경 사진 (${preset.label} 전용, 스타일별로 따로 저장됨)</label>
      <div class="photo-zone">
        ${bg ? `<img src="${bg}">` : `<span class="zone-hint">아직 배경 사진이 없습니다 — 업로드 전까지는 그라데이션 플레이스홀더가 보입니다</span>`}
        <div style="display:flex;gap:6px;width:100%;">
          <button class="btn-secondary" id="shuffleOneBtn" type="button" style="flex:1;">🎲 이 카드</button>
          <button class="btn-secondary" id="shuffleAllBtn" type="button" style="flex:1;">🎲 전체</button>
        </div>
        <input type="file" id="bgUploadInput" accept="image/*">
        ${bg ? `<button class="btn-secondary" id="bgRemoveBtn" type="button">배경 제거</button>` : ''}
      </div>
      ${bg ? `
      <label style="margin-top:4px;">배경 하단 어둡기 (가독성 스크림 ${scrimVal}%)</label>
      <input type="range" id="scrimSlider" min="0" max="100" value="${scrimVal}">` : ''}
    </div>

    <div class="field-group">
      <label>무료 사진 검색 (Pexels/Openverse)</label>
      <div style="display:flex;gap:6px;">
        <input type="text" id="imgSearchInput" placeholder="예: coffee morning" style="flex:1;">
        <button class="btn-secondary" id="imgSearchBtn" type="button">검색</button>
      </div>
      <div id="imgSearchResults" style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;"></div>
      <p class="hint" id="imgSearchStatus"></p>
    </div>

    <div class="field-group">
      <label>AI 배경 생성 (Codex → Gemini → OpenAI 순서로 시도)</label>
      <textarea id="imgGenPrompt" rows="2" placeholder="예: a foggy mountain village at dawn, no text">${esc(slide.bgPrompt || '')}</textarea>
      <button class="btn-primary" id="imgGenBtn" type="button">✨ AI로 배경 생성</button>
      <p class="hint" id="imgGenStatus"></p>
    </div>
  `;

  document.getElementById('bgUploadInput').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const dataUrl = await new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result);
      r.onerror = rej;
      r.readAsDataURL(file);
    });
    state.slides[state.activeIdx].bgByStyle[state.preset] = dataUrl;
    onStateChanged();
  });
  const rmBtn = document.getElementById('bgRemoveBtn');
  if (rmBtn) rmBtn.addEventListener('click', () => {
    delete state.slides[state.activeIdx].bgByStyle[state.preset];
    onStateChanged();
  });

  document.getElementById('shuffleOneBtn').addEventListener('click', () => {
    shuffleSlideBg(state.slides[state.activeIdx]);
    onStateChanged();
  });
  document.getElementById('shuffleAllBtn').addEventListener('click', () => {
    state.slides.forEach(shuffleSlideBg);
    onStateChanged();
  });

  const scrimSlider = document.getElementById('scrimSlider');
  if (scrimSlider) scrimSlider.addEventListener('input', () => {
    state.slides[state.activeIdx].scrim = parseInt(scrimSlider.value, 10);
    saveState();
    renderStage();
    renderFilmstrip();
  });

  document.getElementById('imgSearchBtn').addEventListener('click', () => runImgSearch());
  document.getElementById('imgSearchInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') runImgSearch(); });

  document.getElementById('imgGenBtn').addEventListener('click', () => runImgGen());

function shuffleSlideBg(slide){
  const preset = STYLE_PRESETS[state.preset];
  if (!preset.needsPhoto || !preset.pool || !preset.pool.length) return;
  const pick = preset.pool[Math.floor(Math.random() * preset.pool.length)];
  slide.bgByStyle[state.preset] = pick;
}

async function runImgSearch(){
  const q = document.getElementById('imgSearchInput').value.trim();
  const statusEl = document.getElementById('imgSearchStatus');
  const resultsEl = document.getElementById('imgSearchResults');
  if (!q) { statusEl.textContent = '검색어를 입력하세요.'; return; }
  statusEl.textContent = '검색 중...';
  resultsEl.innerHTML = '';
  try {
    const res = await fetch(apiUrl(`/img-search?q=${encodeURIComponent(q)}`));
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `검색 실패 (${res.status})`);
    if (!data.results || !data.results.length) { statusEl.textContent = '결과가 없습니다.'; return; }
    statusEl.textContent = `${data.source} 검색 결과 ${data.results.length}건`;
    resultsEl.innerHTML = data.results.slice(0, 12).map((r, i) =>
      `<img src="${r.thumb}" data-url="${r.url}" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:6px;cursor:pointer;">`
    ).join('');
    resultsEl.querySelectorAll('img').forEach(img => {
      img.addEventListener('click', () => {
        const proxied = apiUrl(`/img?url=${encodeURIComponent(img.dataset.url)}`);
        state.slides[state.activeIdx].bgByStyle[state.preset] = proxied;
        onStateChanged();
      });
    });
  } catch (err) {
    statusEl.textContent = '⚠️ ' + err.message + ' — start.bat이 켜져 있나요?';
  }
}

async function runImgGen(){
  const prompt = document.getElementById('imgGenPrompt').value.trim();
  const statusEl = document.getElementById('imgGenStatus');
  const btn = document.getElementById('imgGenBtn');
  if (!prompt) { statusEl.textContent = '장면 설명을 입력하세요.'; return; }
  btn.disabled = true;
  statusEl.textContent = '생성 중... (수단에 따라 수 초~2분 소요될 수 있어요)';
  try {
    const res = await fetch(apiUrl('/img-gen'), { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ prompt }) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `생성 실패 (${res.status})`);
    state.slides[state.activeIdx].bgByStyle[state.preset] = resolveAssetPath(data.path);
    state.slides[state.activeIdx].bgPrompt = prompt;
    onStateChanged();
    statusEl.textContent = `✅ ${data.provider}로 생성 완료`;
  } catch (err) {
    statusEl.textContent = '⚠️ ' + err.message;
  } finally {
    btn.disabled = false;
  }
}

  if (!opts.skipFieldPanel) renderFieldPanel();
  if (!opts.skipPhotoZone) renderPhotoZone();

  if (!confirm('모든 슬라이드와 저장된 상태를 초기화할까요? 되돌릴 수 없습니다.')) return;
  localStorage.removeItem(STORAGE_KEY);

});

/* ---- JSON 내보내기/불러오기 ---- */
document.getElementById('exportJsonBtn').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `${state.handle || 'deck'}.json`;
  document.body.appendChild(a); a.click(); a.remove();

});

document.getElementById('importJsonInput').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const parsed = JSON.parse(text);
    if (!parsed.slides || !Array.isArray(parsed.slides) || !parsed.slides.length) throw new Error('slides 배열이 없습니다.');
    parsed.activeIdx = 0;
    if (!parsed.preset || !STYLE_PRESETS[parsed.preset]) parsed.preset = 'blue';
    parsed.slides.forEach(s => { if(!s.bgByStyle) s.bgByStyle = {}; });
    state = parsed;
    bootUI();
    document.getElementById('statusMsg').textContent = '✅ JSON 불러오기 완료';
  } catch (err) {
    alert('불러오기 실패: ' + err.message);
  } finally {
    e.target.value = '';
  }
});

/* ---- 전체 ZIP 내보내기 ---- */
async function exportZIP(){
  const statusEl = document.getElementById('statusMsg');
  const btn = document.getElementById('exportZipBtn');
  btn.disabled = true;
  try {
    await document.fonts.ready;
    const zip = new JSZip();
    const exportStage = document.getElementById('exportStage');

    for (let i = 0; i < state.slides.length; i++){
      statusEl.textContent = `캡처 중... (${i+1}/${state.slides.length})`;
      const slide = state.slides[i];
      exportStage.innerHTML = renderCardHTML(slide.type, slide.f, state.preset, currentBg(slide), slide.scrim);
      const cardEl = exportStage.querySelector('.card');
      fitCard(cardEl);
      await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
      const canvas = await html2canvas(cardEl, { width:1080, height:1350, scale:1, useCORS:true, backgroundColor:'#ffffff' });
      const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
      const num = String(i+1).padStart(2,'0');
      zip.file(`${num}.png`, blob);
    }

    statusEl.textContent = '압축 중...';
    const zipBlob = await zip.generateAsync({ type:'blob' });
    const url = URL.createObjectURL(zipBlob);
    const a = document.createElement('a');
    a.href = url; a.download = `${state.handle || 'deck'}.zip`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    statusEl.textContent = `✅ ZIP 내보내기 완료 (${state.slides.length}장)`;
  } catch (err) {
    console.error(err);
    statusEl.textContent = '⚠️ ZIP 내보내기 실패: ' + err.message;
  } finally {
    btn.disabled = false;
  }
}
document.getElementById('exportZipBtn').addEventListener('click', exportZIP);

/* ============ 서버 주소 (팀 공유) ============ */
const SERVER_KEY = 'cn-server';
function serverBase(){
  const custom = (localStorage.getItem(SERVER_KEY) || '').trim();
  return custom ? custom.replace(/\/+$/, '') : location.origin;
}
function apiUrl(p){ return serverBase() + p; }
function resolveAssetPath(relPath){
  // 서버가 현재 페이지와 같은 origin이면 상대경로 그대로, 다르면 서버 주소 기준 절대경로로 변환
  return serverBase() === location.origin ? relPath : `${serverBase()}/${relPath}`;
}

let CAPS = { ok:false, codex:false, gemini:false, openai:false, pexels:false };
async function refreshCaps(){
  try {
    const res = await fetch(apiUrl('/ping'));
    if (res.ok) CAPS = await res.json();
  } catch (e) { CAPS = { ok:false, codex:false, gemini:false, openai:false, pexels:false }; }
  renderCapsBadges();
}

function renderCapsBadges(){
  const host = document.getElementById('capsBadges');
  if (!host) return;
  const items = [
    ['codex', 'Codex'], ['gemini', 'Gemini'], ['openai', 'OpenAI'], ['pexels', 'Pexels'],
  ];
  host.innerHTML = items.map(([k, label]) => {
    const ok = !!CAPS[k];
    return `<span title="${label}" style="font-size:9px;font-weight:700;padding:2px 6px;border-radius:999px;
      background:${ok ? '#e6f9ee' : '#f4f4f6'};color:${ok ? '#0a9d5c' : '#9aa2af'};">${ok ? '✅' : '⭘'} ${label}</span>`;
  }).join('');
}

function updateServerLabel(){
  const input = document.getElementById('serverAddrInput');
  const custom = localStorage.getItem(SERVER_KEY);
  input.value = custom || '';
  input.placeholder = `자동 인식: ${location.origin}`;
}
document.getElementById('serverSettingsBtn').addEventListener('click', () => {
  const panel = document.getElementById('serverPanel');
  const opening = panel.style.display === 'none';
  panel.style.display = opening ? 'flex' : 'none';
  if (opening) updateServerLabel();
});
document.getElementById('serverSaveBtn').addEventListener('click', async () => {
  const val = document.getElementById('serverAddrInput').value.trim();
  const statusEl = document.getElementById('serverStatus');
  if (val) localStorage.setItem(SERVER_KEY, val); else localStorage.removeItem(SERVER_KEY);
  statusEl.textContent = '연결 확인 중...';
  await refreshCaps();
  statusEl.textContent = CAPS.ok ? `✅ 연결됨: ${serverBase()}` : `⚠️ 연결 실패: ${serverBase()} — 주소를 다시 확인해주세요.`;
});
document.getElementById('serverAutoBtn').addEventListener('click', async () => {
  localStorage.removeItem(SERVER_KEY);
  updateServerLabel();
  const statusEl = document.getElementById('serverStatus');
  statusEl.textContent = '연결 확인 중...';
  await refreshCaps();
  statusEl.textContent = CAPS.ok ? `✅ 자동 인식됨: ${serverBase()}` : `⚠️ 연결 실패: ${serverBase()}`;
});

/* ============ AI 변환 / 빠른변환 (글 → 덱) ============ */
document.getElementById('openConvertBtn').addEventListener('click', () => {
  document.getElementById('convertPanel').style.display = 'flex';
});
document.getElementById('closeConvertBtn').addEventListener('click', () => {
  document.getElementById('convertPanel').style.display = 'none';
});

function sentenceClip(text, maxLen=90){
  text = (text||'').trim();
  if (text.length <= maxLen) return text;
  const cut = text.slice(0, maxLen);
  const cutPoints = ['. ', '다. ', '요. ', '다.', '요.'].map(m => cut.lastIndexOf(m)).filter(i => i > 20);
  const last = cutPoints.length ? Math.max(...cutPoints) : -1;
  return (last > -1 ? cut.slice(0, last+1) : cut) + (last > -1 ? '' : '…');
}

/* ---- 빠른변환(오프라인 폴백): AI 없이 규칙 기반 파서 ---- */
function quickConvertToSlides(text){
  const lines = text.split('\n').map(l => l.trim()).filter(l => l.length);
  if (!lines.length) throw new Error('붙여넣은 내용이 비어있습니다.');

  const title = lines[0];
  const rest = lines.slice(1);

  const tableLines = [];
  const bodyLines = [];
  rest.forEach(l => {
    if ((l.match(/\|/g) || []).length >= 2) tableLines.push(l);
    else bodyLines.push(l);
  });

  const sections = [];
  let current = null;
  bodyLines.forEach(l => {
    const headMatch = l.match(/^#{1,3}\s*(.+)/) || l.match(/^\d+[\.\)]\s*(.+)/);
    if (headMatch) {
      if (current) sections.push(current);
      current = { head: headMatch[1], desc: [] };
    } else if (current) {
      current.desc.push(l);
    } else {
      current = { head: null, desc: [l] };
    }
  });
  if (current) sections.push(current);

  const slides = [];
  slides.push({ type:'cover', f:{ badge:'요약 카드뉴스', title, sub:'' }, bgByStyle:{} });

  let stepSections = sections;
  if (sections.length && !sections[0].head) {
    const intro = sections[0];
    slides.push({ type:'content', f:{ idx:'', total:'', tag:'들어가며', num:'', head:'', desc: sentenceClip(intro.desc.join(' ')) }, bgByStyle:{} });
    stepSections = sections.slice(1);
  }

  const total = String(stepSections.length || 1).padStart(2,'0');
  stepSections.forEach((s, i) => {
    const idx = String(i+1).padStart(2,'0');
    slides.push({ type:'content', f:{ idx, total, tag:`STEP ${idx}`, num: idx, head: s.head || '', desc: sentenceClip(s.desc.join(' ')) }, bgByStyle:{} });
  });

  if (tableLines.length >= 2) {
    const rows = tableLines.map(l => l.split('|').map(c=>c.trim()).filter(Boolean).join(' | ')).join('\n');
    slides.push({ type:'table', f:{ title:'요약 비교', rows }, bgByStyle:{} });
  }

  slides.push({ type:'closing', f:{ head:'지금 바로\n*확인*해보세요', desc:'',
    cta1:'AI 커뮤니티 참여', cta2:'댓글 AIMAX', hint:'' }, bgByStyle:{} });

  return slides;
}

/* ---- 고정 CTA 강제 (AI가 다르게 내놓아도 항상 동일하게 고정) ---- */
function enforceClosingCTA(slides){
  const last = slides[slides.length - 1];
  if (last && last.type === 'closing') {
    last.f.cta1 = 'AI 커뮤니티 참여';
    last.f.cta2 = '댓글 AIMAX';
  }
  return slides;
}

function applyConvertedSlides(rawSlides){
  const slides = rawSlides.map(s => ({ type:s.type, f:{...s.f}, bgByStyle:{}, bgPrompt: s.bg || null }));
  enforceClosingCTA(slides);
  state.slides = slides;
  state.activeIdx = 0;
  document.getElementById('convertPanel').style.display = 'none';
  document.getElementById('convertText').value = '';
  onStateChanged();
}

/* ---- AI 변환 직후 자동 배경: ①즉시 풀 셔플 → ②생성 수단 있으면 표지/인용/마무리 순차 교체 ---- */
async function autoBackgroundAfterConvert(){
  const preset = STYLE_PRESETS[state.preset];
  if (!preset.needsPhoto) return; // 사진 스타일에서만 동작

  // ① 즉시 풀 셔플로 고정 기본값 탈출
  state.slides.forEach(shuffleSlideBg);
  onStateChanged();

  // ② 생성 수단 감지되면 표지·인용·마무리를 주제 맞춤 배경으로 순차 교체
  await refreshCaps();
  const hasGenMeans = CAPS.codex || CAPS.gemini || CAPS.openai;
  if (!hasGenMeans) return;

  const statusEl = document.getElementById('statusMsg');
  const targets = state.slides.filter(s => ['cover','quote','closing'].includes(s.type) && s.bgPrompt);
  for (let i = 0; i < targets.length; i++){
    const slide = targets[i];
    statusEl.textContent = `배경 자동 생성 중... (${i+1}/${targets.length})`;
    try {
      const res = await fetch(apiUrl('/img-gen'), { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ prompt: slide.bgPrompt }) });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || '생성 실패');
      slide.bgByStyle[state.preset] = resolveAssetPath(data.path);
      onStateChanged({ skipFieldPanel:true });
    } catch (e) {
      console.warn('자동 배경 생성 실패, 셔플 상태 유지:', e.message); // 그레이스풀 디그레이드
    }
  }
  statusEl.textContent = `✅ 자동 배경 적용 완료`;
}

document.getElementById('quickConvertBtn').addEventListener('click', () => {
  const statusEl = document.getElementById('convertStatus');
  try {
    const text = document.getElementById('convertText').value;
    const slides = quickConvertToSlides(text);
    applyConvertedSlides(slides);
    statusEl.textContent = `✅ 빠른변환 완료 (${slides.length}장, AI 미사용)`;
  } catch (err) {
    statusEl.textContent = '⚠️ ' + err.message;
  }
});

document.getElementById('aiConvertBtn').addEventListener('click', async () => {
  const statusEl = document.getElementById('convertStatus');
  const btn = document.getElementById('aiConvertBtn');
  const text = document.getElementById('convertText').value;
  if (!text.trim()) { statusEl.textContent = '⚠️ 붙여넣은 글이 비어있습니다.'; return; }

  btn.disabled = true;
  statusEl.textContent = 'AI 변환 중입니다... (20~40초 정도 걸려요)';
  try {
    const res = await fetch(apiUrl('/convert'), {
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ text })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `서버 오류 (${res.status})`);
    if (!data.slides || !Array.isArray(data.slides) || !data.slides.length) throw new Error('변환 결과에 slides가 없습니다.');
    applyConvertedSlides(data.slides);
    statusEl.textContent = `✅ AI 변환 완료 (${data.slides.length}장)`;
    autoBackgroundAfterConvert();
  } catch (err) {
    statusEl.textContent = '⚠️ AI 변환 실패: ' + err.message + ' — start.bat이 켜져 있나요? (서버 없이는 "빠른변환"만 가능합니다)';
  } finally {
    btn.disabled = false;
  }
});

  buildStyleSelect();

}
bootUI();
refreshCaps();
