name: Daily AI News Auto Publisher

on:
  schedule:
    # Runs at 22:00 UTC every day (which is 07:00 AM KST the next day)
    - cron: '0 22 * * *'
  workflow_dispatch:
    # Allows manual trigger from the GitHub Actions tab

jobs:
  publish-news:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run AI news crawler and publisher
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python scripts/daily_news_agent.py
